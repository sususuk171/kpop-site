<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>루비 키위 랜딩 페이지</title>
    <!-- FontAwesome 아이콘 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- 내비게이션 바 -->
    <nav class="navbar">
        <div class="logo">루비 키위</div>
        <ul class="nav-links">
            <li><a href="#home">홈페이지</a></li>
            <li><a href="#product">제품</a></li>
            <li><a href="#story">스토리</a></li>
            <li><a href="#contact">문의</a></li>
        </ul>
        <div class="lang-switch">
            <a href="index.html" class="active">KOR</a> | <a href="index_en.html">ENG</a>
        </div>
    </nav>

    <!-- 히어로 섹션 -->
    <section class="hero" id="home">
        <div class="hero-content">
            <h1>매일 만나는 달콤한 보석, 루비 키위</h1>
            <p>프리미엄 루비 키위로 당신의 일상에 특별함을 더해보세요.</p>
            <img src="images/ruby-kiwi.jpg" alt="신선하고 먹음직스러운 붉은 과육의 루비 키위" class="hero-image">
            <a href="#purchase" class="cta-button">지금 구매하기</a>
        </div>
    </section>

    <!-- 제품 특징 섹션 -->
    <section class="features" id="product">
        <div class="container">
            <h2 class="section-title">루비 키위만의 특별함</h2>
            <div class="features-grid">
                <!-- 특징 1 -->
                <div class="feature-card">
                    <div class="feature-icon">
                        <i class="fa-solid fa-star"></i>
                    </div>
                    <h3>높은 당도</h3>
                    <p>입안 가득 퍼지는 달콤함, 일반 키위보다 압도적으로 높은 브릭스를 자랑합니다.</p>
                </div>
                <!-- 특징 2 -->
                <div class="feature-card">
                    <div class="feature-icon">
                        <i class="fa-solid fa-gem"></i>
                    </div>
                    <h3>매혹적인 붉은 과육</h3>
                    <p>보석처럼 빛나는 붉은색 과육이 보는 즐거움과 특별한 미식 경험을 선사합니다.</p>
                </div>
                <!-- 특징 3 -->
                <div class="feature-card">
                    <div class="feature-icon">
                        <i class="fa-solid fa-leaf"></i>
                    </div>
                    <h3>풍부한 비타민</h3>
                    <p>비타민 C와 항산화 물질이 듬뿍 들어있어 매일매일 건강한 활력을 채워줍니다.</p>
                </div>
            </div>
        </div>
    </section>
</body>
</html>
